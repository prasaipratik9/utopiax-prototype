<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenMindX - Speaking | UtopiaX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="openmindx" data-public-site>
  <div id="site-header"></div>

    <section class="page-hero">
      <div class="container reveal">
        <p class="eyebrow" data-cms="openmindx.eyebrow">OpenMindX</p>
        <h1 data-cms="openmindx.title">Speaking</h1>
        <p class="lead" data-cms="openmindx.lead">Dream out loud and impact the world.</p>

    </section>
    <section class="section">
      <div class="container prose reveal">
        <p data-cms="openmindx.body1">Anything is possible.</p>

        <blockquote class="blockquote" data-cms="openmindx.quote">Testimonial quote.</blockquote>

    </section>
    <section class="section section-alt">
      <div class="container reveal">
        <header class="section-header"><h2 data-cms="openmindx.keynotesTitle">Featured keynotes</h2></header>
        <div id="openmindx-keynotes" class="card-grid"></div>
        <p style="margin-top: 2rem;"><a href="contact.html" class="btn btn-primary">Book a keynote</a></p>
      </div>
